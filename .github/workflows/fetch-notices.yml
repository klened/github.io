name: Fetch rent notices

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 KST 08:00 (UTC 23시)
  workflow_dispatch:         # 수동 실행도 가능

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch LH·SH rental notices
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: python .github/scripts/fetch_notices.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/notices.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore(notices): 매일 자동 갱신 [skip ci]"
            git push
          fi
